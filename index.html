<body>

<div class="card">

<h2>🪜 足場架設・撤去申請</h2>

<label>業者名</label>
<input id="company">

<div id="requestArea"></div>

<button type="button" class="subBtn" id="addBtn">＋申請行を追加</button>
<button type="button" id="sendBtn">まとめて申請</button>

<div id="status"></div>

<h3>あなたの申請（2日以内）</h3>

<table>
<thead>
<tr>
<th>日</th>
<th>時間</th>
<th>船番</th>
<th>場所</th>
<th></th>
</tr>
</thead>
<tbody id="myList"></tbody>
</table>

</div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwKHAEVWUx4hYehXZ7xqwI8w2-PYcffU7sP3lNhBhysUyH_t9XAcKqdJjiXT1_CiIJ3/exec";

const company=document.getElementById("company");
const requestArea=document.getElementById("requestArea");
const addBtn=document.getElementById("addBtn");
const sendBtn=document.getElementById("sendBtn");
const status=document.getElementById("status");

let rowCount=0;
let sending=false;
const MAX_ROWS=5;

/* 今日 */
function today(){
  return new Date().toISOString().split("T")[0];
}

/* 時間生成 */
function timeOptions(){
  let html='<option value="">選択してください</option>';

  for(let h=8;h<=17;h++){
    let t=("0"+h).slice(-2)+":00";
    html+=`<option value="${t}">${t}</option>`;
  }

  return html;
}

/* ID生成 */
function makeID(){
  return Math.random().toString(36).substring(2,10);
}

/* 行追加 */
function addRow(){

  if(rowCount>=MAX_ROWS){
    alert("最大5件までです");
    return;
  }

  rowCount++;

  const div=document.createElement("div");
  div.className="reqBox";

  div.innerHTML=`
    <div class="reqTitle">申請 ${rowCount}件目</div>

    <label>作業日</label>
    <input type="date" class="date" value="${today()}">

    <label>時間</label>
    <select class="time">
      ${timeOptions()}
    </select>

    <label>作業場所</label>
    <select class="place">
      <option value="">選択</option>
      <option>A棟</option>
      <option>B棟</option>
      <option>C棟</option>
      <option>SUB定盤</option>
      <option>ドック</option>
      <option>渠底</option>
      <option>南岸</option>
      <option>艤装船</option>
      <option>南定盤</option>
      <option>北定盤</option>
      <option>ブロック置き場</option>
      <option>その他</option>
    </select>

    <label>船番</label>
    <div class="shipWrap">
      <div class="prefix">SA</div>
      <input class="ship shipInput">
    </div>

    <label>区画</label>
    <input class="area">

    <label>作業区分</label>
    <select class="type">
      <option>架設</option>
      <option>撤去</option>
    </select>

    <label>備考</label>
    <textarea class="note"></textarea>

    <button type="button" class="delBtn" onclick="removeRow(this)">この行を削除</button>
  `;

  requestArea.appendChild(div);
}

/* 行削除 */
function removeRow(btn){
  btn.closest(".reqBox").remove();
  renumber();
}

/* 番号振り直し */
function renumber(){
  const rows=document.querySelectorAll(".reqBox");
  rowCount=rows.length;

  rows.forEach((row,i)=>{
    row.querySelector(".reqTitle").textContent=`申請 ${i+1}件目`;
  });
}

/* 履歴表示 */
function loadMy(){

let data=JSON.parse(localStorage.getItem("myScaffold")||"[]");

const limit=Date.now()-172800000;

data=data.filter(d=>d.timeStamp>limit);

localStorage.setItem("myScaffold",JSON.stringify(data));

data.sort((a,b)=>b.timeStamp-a.timeStamp);

const tbody=document.getElementById("myList");
tbody.innerHTML="";

data.forEach(d=>{

  let dt=new Date(d.date);
  let shortDate=(dt.getMonth()+1)+"/"+dt.getDate();

  const tr=document.createElement("tr");

  tr.innerHTML=
    "<td>"+shortDate+"</td>"+
    "<td>"+d.time+"</td>"+
    "<td>"+d.ship+"</td>"+
    "<td>"+d.place+"</td>"+
    "<td><button class='cancelBtn' onclick='cancelReq(\""+d.id+"\")'>取消</button></td>";

  tbody.appendChild(tr);

});

}

/* 入力初期化 */
function resetForm(){

  requestArea.innerHTML="";
  rowCount=0;
  addRow();
}

/* 一括送信 */
async function sendAll(){

if(sending)return;

if(!company.value.trim()){
  status.textContent="業者名を入力してください";
  return;
}

const rows=document.querySelectorAll(".reqBox");

if(rows.length===0){
  status.textContent="申請行がありません";
  return;
}

let list=[];

/* データ作成 */
for(const row of rows){

  const data={

    mode:"add",
    id:makeID(),
    timeStamp:Date.now(),

    date:row.querySelector(".date").value,
    time:row.querySelector(".time").value,
    company:company.value.trim(),
    place:row.querySelector(".place").value,
    ship:"SA"+row.querySelector(".ship").value.trim(),
    area:row.querySelector(".area").value.trim(),
    type:row.querySelector(".type").value,
    note:row.querySelector(".note").value.trim()

  };

  if(!data.date || !data.time || !data.place ||
     !data.ship.replace("SA","") || !data.area){
    status.textContent="未入力があります";
    return;
  }

  list.push(data);
}

/* 確認画面 */
let msg=`以下の${list.length}件を申請します\n\n業者名：${company.value}\n\n`;

list.forEach((d,i)=>{
  msg += `${i+1}. ${d.date} ${d.time} ${d.ship} ${d.place} ${d.type}\n`;
});

msg += "\nこの内容で送信しますか？";

if(!confirm(msg)) return;

/* 送信 */
sending=true;
sendBtn.disabled=true;
status.textContent="送信中...";

for(const data of list){

  await fetch(GAS_URL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(data)
  });

  let my=JSON.parse(localStorage.getItem("myScaffold")||"[]");
  my.push(data);
  localStorage.setItem("myScaffold",JSON.stringify(my));
}

status.textContent="申請完了";

resetForm();
loadMy();

sendBtn.disabled=false;
sending=false;

}

/* 取消 */
async function cancelReq(id){

let my=JSON.parse(localStorage.getItem("myScaffold")||"[]");
const item=my.find(x=>x.id==id);

if(!item)return;

let dt=new Date(item.date);
let shortDate=(dt.getMonth()+1)+"/"+dt.getDate();

const msg=
"この申請を取消しますか？\n\n"+
"日付: "+shortDate+"\n"+
"時間: "+item.time+"\n"+
"船番: "+item.ship+"\n"+
"場所: "+item.place+"\n"+
"区画: "+item.area+"\n"+
"区分: "+item.type;

if(!confirm(msg)) return;

await fetch(GAS_URL,{
  method:"POST",
  mode:"no-cors",
  body:JSON.stringify({
    mode:"delete",
    id:id
  })
});

my=my.filter(x=>x.id!=id);
localStorage.setItem("myScaffold",JSON.stringify(my));

loadMy();

}

/* 初期 */
addBtn.addEventListener("click",addRow);
sendBtn.addEventListener("click",sendAll);

addRow();
loadMy();

</script>

</body>
</html>
