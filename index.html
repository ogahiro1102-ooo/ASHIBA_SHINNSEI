<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>足場架設・撤去申請</title>

<style>

body{
font-family:sans-serif;
background:#f2f4f7;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
max-width:520px;
margin:auto;
}

label{
display:block;
margin-top:12px;
font-weight:bold
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:4px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:#2b7cff;
color:white;
border:none;
border-radius:8px;
font-size:14px;
}

button:disabled{
background:#999;
}

table{
margin-top:25px;
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:6px;
font-size:12px;
text-align:center;
}

.shipWrap{display:flex}

.prefix{
background:#ddd;
padding:8px;
border:1px solid #ccc;
border-right:none;
border-radius:6px 0 0 6px;
}

.shipInput{
border-radius:0 6px 6px 0
}

.cancelBtn{
background:#e74c3c;
}

#status{
margin-top:10px;
font-weight:bold;
text-align:center;
}

</style>
</head>
<body>

<div class="card">

<h2>足場架設・撤去申請</h2>

<label>作業日</label>
<input type="date" id="date">

<label>時間</label>
<select id="time"></select>

<label>業者名</label>
<input id="company">

<label>作業場所</label>
<select id="place">
<option value="">選択</option>
<option>A棟</option>
<option>B棟</option>
<option>C棟</option>
<option>SUB定盤</option>
<option>ドック</option>
<option>渠底</option>
<option>南岸</option>
<option>艤装船</option>
<option>南定盤</option>
<option>北定盤</option>
<option>ブロック置き場</option>
<option>その他</option>
</select>

<label>船番</label>

<div class="shipWrap">
<div class="prefix">SA</div>
<input id="ship" class="shipInput">
</div>

<label>区画</label>
<input id="area">

<label>作業区分</label>
<select id="type">
<option>架設</option>
<option>撤去</option>
</select>

<label>備考</label>
<textarea id="note"></textarea>

<button id="sendBtn">申請</button>

<div id="status"></div>

<h3>あなたの申請（2日以内）</h3>

<table>

<thead>
<tr>
<th>日</th>
<th>時間</th>
<th>船番</th>
<th>場所</th>
<th></th>
</tr>
</thead>

<tbody id="myList"></tbody>

</table>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbwKHAEVWUx4hYehXZ7xqwI8w2-PYcffU7sP3lNhBhysUyH_t9XAcKqdJjiXT1_CiIJ3/exec";

const sendBtn=document.getElementById("sendBtn");
const status=document.getElementById("status");

const time=document.getElementById("time");
const date=document.getElementById("date");
const company=document.getElementById("company");
const place=document.getElementById("place");
const ship=document.getElementById("ship");
const area=document.getElementById("area");
const type=document.getElementById("type");
const note=document.getElementById("note");

let sending=false;


/* 時間プルダウン */

for(let h=8;h<=17;h++){

let t=("0"+h).slice(-2)+":00";

let opt=document.createElement("option");

opt.value=t;
opt.textContent=t;

time.appendChild(opt);

}


/* ID生成 */

function makeID(){
return Math.random().toString(36).substring(2,10);
}


/* 履歴表示 */

function loadMy(){

let data=JSON.parse(localStorage.getItem("myScaffold")||"[]");

/* 48時間以内 */

const limit=Date.now()-172800000;

data=data.filter(d=>d.timeStamp>limit);

localStorage.setItem("myScaffold",JSON.stringify(data));

/* 新しい順 */

data.sort((a,b)=>b.timeStamp-a.timeStamp);

const tbody=document.getElementById("myList");

tbody.innerHTML="";

data.forEach(d=>{

let dt=new Date(d.date);

let shortDate=(dt.getMonth()+1)+"/"+dt.getDate();

const tr=document.createElement("tr");

tr.innerHTML=

"<td>"+shortDate+"</td>"+
"<td>"+d.time+"</td>"+
"<td>"+d.ship+"</td>"+
"<td>"+d.place+"</td>"+
"<td><button class='cancelBtn' onclick='cancelReq(\""+d.id+"\")'>取消</button></td>";

tbody.appendChild(tr);

});

}


/* 申請 */

sendBtn.addEventListener("click",send);

async function send(){

if(sending)return;


/* 同内容ロック */

const hash = JSON.stringify({
date:date.value,
time:time.value,
company:company.value,
place:place.value,
ship:ship.value,
area:area.value,
type:type.value
});

const prev = localStorage.getItem("scaffoldHash");
const lastTime = localStorage.getItem("scaffoldTime");

if(prev === hash && Date.now() - lastTime < 60000){

status.textContent="同じ内容の申請は60秒以内に送信できません";

return;

}


const data={

mode:"add",
id:makeID(),
timeStamp:Date.now(),

date:date.value,
time:time.value,
company:company.value,
place:place.value,
ship:"SA"+ship.value,
area:area.value,
type:type.value,
note:note.value

};


sending=true;

sendBtn.disabled=true;

status.textContent="送信中...";


await fetch(GAS_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(data)
});


localStorage.setItem("scaffoldHash",hash);
localStorage.setItem("scaffoldTime",Date.now());


let my=JSON.parse(localStorage.getItem("myScaffold")||"[]");

my.push(data);

localStorage.setItem("myScaffold",JSON.stringify(my));


status.textContent="申請完了";

loadMy();

sendBtn.disabled=false;

sending=false;

}


/* 取消 */

async function cancelReq(id){

let my=JSON.parse(localStorage.getItem("myScaffold")||"[]");

const item=my.find(x=>x.id==id);

if(!item)return;

let dt=new Date(item.date);

let shortDate=(dt.getMonth()+1)+"/"+dt.getDate();

const msg=
"この申請を取消しますか？\n\n"+
"日付: "+shortDate+"\n"+
"時間: "+item.time+"\n"+
"船番: "+item.ship+"\n"+
"場所: "+item.place+"\n"+
"区画: "+item.area+"\n"+
"区分: "+item.type;

const ok=confirm(msg);

if(!ok)return;

await fetch(GAS_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
mode:"delete",
id:id
})
});

my=my.filter(x=>x.id!=id);

localStorage.setItem("myScaffold",JSON.stringify(my));

loadMy();

}

loadMy();

</script>

</body>
</html>
