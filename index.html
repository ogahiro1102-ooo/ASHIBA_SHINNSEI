```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>足場仮設・撤去申請</title>

<style>

body{
font-family:sans-serif;
background:#f2f4f7;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
max-width:520px;
margin:auto;
}

label{
display:block;
margin-top:12px;
font-weight:bold
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:4px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box
}

button{
margin-top:18px;
padding:12px;
width:100%;
background:#2b7cff;
color:white;
border:none;
border-radius:8px;
font-size:16px
}

button:disabled{
background:#999
}

.shipWrap{
display:flex
}

.prefix{
background:#ddd;
padding:8px;
border-radius:6px 0 0 6px;
border:1px solid #ccc;
border-right:none
}

.shipInput{
border-radius:0 6px 6px 0
}

#status{
margin-top:10px;
text-align:center;
font-weight:bold
}

#lastBox{
margin-top:20px;
padding:12px;
background:#eef3ff;
border-radius:8px;
display:none
}

</style>
</head>
<body>

<div class="card">

<h2>足場仮設・撤去申請</h2>

<label>作業日</label>
<input type="date" id="date">

<label>希望時間帯</label>
<select id="time"></select>

<label>業者名</label>
<input id="company">

<label>作業場所</label>
<input id="place">

<label>船番</label>

<div class="shipWrap">
<div class="prefix">SA</div>
<input id="ship" class="shipInput" placeholder="001">
</div>

<label>区画</label>
<input id="area">

<label>作業区分</label>
<select id="type">
<option value="仮設">仮設</option>
<option value="撤去">撤去</option>
</select>

<label>備考（任意）</label>
<textarea id="note"></textarea>

<button id="sendBtn">申請</button>

<div id="status"></div>

<div id="lastBox"></div>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbyfpRM7xiclcFSG0g3NuaSPQT5fpUTxjm2ASR1dVvlOIXFvp2MOnD2HqOM8uNHQGEP2/exec";

const date=document.getElementById("date");
const time=document.getElementById("time");
const company=document.getElementById("company");
const place=document.getElementById("place");
const ship=document.getElementById("ship");
const area=document.getElementById("area");
const type=document.getElementById("type");
const note=document.getElementById("note");
const status=document.getElementById("status");
const lastBox=document.getElementById("lastBox");
const sendBtn=document.getElementById("sendBtn");

let locked=false;

for(let h=8;h<=17;h++){

let t=("0"+h).slice(-2)+":00";

let opt=document.createElement("option");

opt.value=t;
opt.textContent=t;

time.appendChild(opt);

}

window.addEventListener("load",()=>{

const last=localStorage.getItem("lastScaffold");

if(last){

showLast(JSON.parse(last));

}

});

function lockUI(lock){

document.querySelectorAll("input,select,textarea,button")
.forEach(el=>el.disabled=lock);

}

function showLast(data){

lastBox.style.display="block";

lastBox.innerHTML=

"<b>直前の申請</b><br>"+
"作業日："+data.date+" "+data.time+"<br>"+
"業者："+data.company+"<br>"+
"船番："+data.ship+"<br>"+
"場所："+data.place+"<br>"+
"区画："+data.area+"<br>"+
"区分："+data.type+"<br>"+
"備考："+(data.note||"なし");

}

sendBtn.addEventListener("click",async()=>{

if(locked)return;

const data={

date:date.value,
time:time.value,
company:company.value.trim(),
place:place.value.trim(),
ship:"SA"+ship.value.trim(),
area:area.value.trim(),
type:type.value,
note:note.value.trim()

};

if(!data.date||!data.time||!data.company||!ship.value){

status.textContent="必須項目が未入力です";

return;

}

const hash=JSON.stringify(data);

const prev=localStorage.getItem("scaffoldHash");

const lastTime=localStorage.getItem("scaffoldTime");

if(prev===hash && Date.now()-lastTime<60000){

status.textContent="同じ内容は連続送信できません";

return;

}

locked=true;

lockUI(true);

status.textContent="送信中...";

try{

await fetch(GAS_URL,{

method:"POST",
mode:"no-cors",
headers:{'Content-Type':'application/json'},
body:JSON.stringify(data)

});

localStorage.setItem("scaffoldHash",hash);

localStorage.setItem("scaffoldTime",Date.now());

localStorage.setItem("lastScaffold",JSON.stringify(data));

status.textContent="申請完了";

showLast(data);

document.querySelectorAll("input,textarea")
.forEach(e=>e.value="");

}catch{

status.textContent="通信失敗";

}

lockUI(false);

locked=false;

});

</script>

</body>
</html>
